<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Factorial</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">
        <h1>Factorial</h1>
        
        <form method="POST">
            <label for="numero">Introduce un número:</label>
            <input type="number" id="numero" name="numero" 
                   value="{{ n if n != None else '' }}" required>
            
            <button type="submit">Calcular Factorial</button>
        </form>

        {% if result != None %}
            <div class="result-box">
                {% if result is string and "Error" in result %}
                    <p class="error">{{ result }}</p>
                {% else %}
                    <p>El factorial de <strong>{{ n }}</strong> es:</p>
                    <h2>{{ result }}</h2>
                {% endif %}
            </div>
        {% endif %}
    </div>

</body>
</html>
